<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <main>
        <h2>Bienvenido de vuelta</h2>
        <p>Por favor, ingresa tus credenciales para continuar.</p>

        <form id="miFormulario">
            
            <div>
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo_usuario" placeholder="ejemplo@correo.com" required>
            </div>
            
            <br>

            <div>
                <label for="clave">Contraseña:</label>
                <input type="password" id="clave" name="clave_usuario" placeholder="Ingresa tu contraseña" required>
            </div>
            
            <br>

            <button id="enviar">Enviar</button>
            <button id="mialerta">Boton de prueba</button>
            
        </form>

        <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
    </main>
<script src="lote1.js"></script>
</body>
</html>
