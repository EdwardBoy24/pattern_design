<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <main>
        <h2>Registrate aqui</h2>
        <p>(Rellena las casillas con tus datos)</p>

        <form id="miRegistro">
            
            <div>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre_usuario" placeholder="Usuario_feliz69" required>
            </div>

            <br>

            <div class="selecion_genero">
                        <label>Indica tu genero:</label>
                        <div class="grupo-radios">
                            <label><input type="radio" name="genero_usuario" value="Masculino"> Masculino</label>
                            <label><input type="radio" name="genero_usuario" value="Femenino"> Femenino</label>
                            <label><input type="radio" name="genero_usuario" value="Otro"> Otro</label>
                        </div>
            </div>

            <br>

            <div>
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo_usuario" placeholder="ejemplo@correo.com" required>
            </div>
            
            <br>

            <div>
                <label for="clave">Contraseña:</label>
                <input type="password" id="clave" name="clave_usuario" placeholder="Ingresa tu contraseña" required>
            </div>
            
            <br>

            <button id="enviar">Enviar</button>
            
        </form>

        <p>¿Ya tienes cuenta? <a href="login.html">¡ENTRA AQUI!</a></p>
    </main>
<script src="lote2.js"></script>
</body>
</html>
